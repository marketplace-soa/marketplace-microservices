syntax = "proto3";

package product;

// Représente un produit dans la marketplace
message Product {
  string id = 1;
  string name = 2;
  string description = 3;
  double price = 4;
  int32 stock = 5;
  string category = 6;
  double promo_price = 7;
  string promo_expires_at = 8;
  string created_at = 9;
}

// Requête pour récupérer un produit par id
message GetProductRequest {
  string id = 1;
}

message GetProductResponse {
  Product product = 1;
}

// Requête pour lister les produits
// category est optionnel : vide = tous les produits
message ListProductsRequest {
  string category = 1;
}

message ListProductsResponse {
  repeated Product products = 1;
}

// Requête pour créer un produit
message CreateProductRequest {
  string name = 1;
  string description = 2;
  double price = 3;
  int32 stock = 4;
  string category = 5;
  double promo_price = 6;
  string promo_expires_at = 7;
}

message CreateProductResponse {
  Product product = 1;
}

// Requête pour modifier le stock
message UpdateStockRequest {
  string id = 1;
  int32 quantity = 2;
}

message UpdateStockResponse {
  Product product = 1;
}

// Recherche par mot-clé
message SearchProductsRequest {
  string query = 1;
}

message SearchProductsResponse {
  repeated Product products = 1;
}

// Produits en promotion encore valides
message GetPromoProductsRequest {}

message GetPromoProductsResponse {
  repeated Product products = 1;
}

// Service gRPC du microservice Produit
service ProductService {
  rpc GetProduct(GetProductRequest) returns (GetProductResponse);
  rpc ListProducts(ListProductsRequest) returns (ListProductsResponse);
  rpc CreateProduct(CreateProductRequest) returns (CreateProductResponse);
  rpc UpdateStock(UpdateStockRequest) returns (UpdateStockResponse);
  rpc SearchProducts(SearchProductsRequest) returns (SearchProductsResponse);
  rpc GetPromoProducts(GetPromoProductsRequest) returns (GetPromoProductsResponse);
}